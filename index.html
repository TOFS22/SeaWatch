<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>LoRa Live Dashboard</title>
    <link rel="stylesheet" href="Design.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <div class="dashboard-container">
    <h2>SeaWatch Live</h2>
    <div id="status">CONNECTING...</div>
    
    <div class="data-grid">
        <div class="card">
            <div class="label">KRAAKEBOLLE COUNT</div>
            <div id="payload">4</div>
        </div>
        <div class="card">
            <div class="label">LAST SEEN</div>
            <div id="timestamp">12:27:15</div>
            <div id="device-id">DEVICE: ...</div>
        </div>
      </div>
    </div>
    <script src="Brain.js"></script>
  </body>
</html>
