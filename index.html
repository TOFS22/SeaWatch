<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>LoRa Live Dashboard</title>
    <link rel="stylesheet" href="Design.css" />
  </head>
  <body>
    <div class="dashboard-container">
    <h1>SeaWatch Live</h1>
    <div id="status" class="label">Connecting...</div>

    <div class="data-grid">
        <div class="card">
            <span class="label">Kraakebolle Count</span>
            <b id="payload">0</b>
        </div>
        <div class="card">
            <span class="label">Last Seen</span>
            <span id="timestamp" style="display:block;">--:--</span>
            <span id="device-id" class="label">Device: ...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="Brain.js"></script>
  </body>
</html>
